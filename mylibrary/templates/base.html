<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжная полка{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'book_list' %}">Книжная полка</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                  {% if user.is_authenticated %}
    <li class="nav-item">
        <span class="nav-link">Привет, {{ user.username }}</span>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{% url 'profile' %}">Профиль</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{% url 'propose_book' %}">Предложить книгу</a>
    </li>
    <li class="nav-item">
    <form method="post" action="{% url 'logout' %}" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="nav-link btn btn-link" style="display: inline-block; background: none; border: none; padding: 0.5rem 1rem; margin: 0; color: rgba(255,255,255,0.55); text-decoration: none;">
            Выйти
        </button>
    </form>
</li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Войти</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'register' %}">Регистрация</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
