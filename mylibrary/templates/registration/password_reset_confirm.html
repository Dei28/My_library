{% extends 'base.html' %}
{% block title %}Новый пароль{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Создайте новый пароль</h4>
            </div>
            <div class="card-body">
                {% if validlink %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_new_password1" class="form-label">Новый пароль</label>
                            <input type="password" name="new_password1" class="form-control" required id="id_new_password1">
                        </div>
                        <div class="mb-3">
                            <label for="id_new_password2" class="form-label">Подтверждение пароля</label>
                            <input type="password" name="new_password2" class="form-control" required id="id_new_password2">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Сменить пароль</button>
                        </div>
                    </form>
                {% else %}
                    <p>Эта ссылка недействительна или уже была использована.</p>
                    <a href="{% url 'password_reset' %}" class="btn btn-primary">Запросить сброс пароля заново</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
