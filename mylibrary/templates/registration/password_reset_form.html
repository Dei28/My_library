{% extends 'base.html' %}
{% block title %}Восстановление пароля{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Забыли пароль?</h4>
            </div>
            <div class="card-body">
                <p>Введите ваш email, и мы отправим ссылку для восстановления.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required id="id_email">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Отправить ссылку</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{% url 'login' %}">Вспомнили пароль? Войти</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
