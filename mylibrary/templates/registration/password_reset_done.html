{% extends 'base.html' %}
{% block title %}Письмо отправлено{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white text-center">
                <h4 class="mb-0">Проверьте почту</h4>
            </div>
            <div class="card-body text-center">
                <p>Мы отправили инструкцию по восстановлению пароля на ваш email, если он есть в нашей базе.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">Вернуться ко входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
